- defaults:
    link:
      create: true
      relink: true

- clean: ['~', '~/.config']

- link:
    /etc/apt/apt.conf.d/90assumeyes: bash/90assumeyes
    ~/.bashrc: bash/bashrc
    ~/.gitconfig: git/gitconfig
    ~/.gitignore: git/final_gitignore
    ~/.inputrc: bash/inputrc
    ~/.lessfilter: bash/lessfilter
    ~/.profile: bash/profile
    ~/.tmux.conf: tmux/tmux.conf
    ~/.vim: vim/vim
    ~/.vimrc: vim/vimrc

- link:
    ~/.claude/CLAUDE.md: { path: claude/CLAUDE.md, force: true }
    ~/.claude/settings.json: { path: claude/settings.json, force: true }
    ~/.claude/statusline-command.sh: { path: claude/statusline-command.sh, force: true }
    ~/.claude/hooks/notify-lib.sh: { path: claude/hooks/notify-lib.sh, create: true, force: true }
    ~/.claude/hooks/session-name.sh: { path: claude/hooks/session-name.sh, force: true }
    ~/.claude/hooks/notify-slack.sh: { path: claude/hooks/notify-slack.sh, force: true }
    ~/.claude/hooks/notify-done.sh: { path: claude/hooks/notify-done.sh, force: true }
    ~/.claude/hooks/notify-session-start.sh: { path: claude/hooks/notify-session-start.sh, force: true }
    ~/.claude/plugins/installed_plugins.json: { path: claude/plugins/installed_plugins.json, create: true, force: true }
    ~/.claude/plugins/known_marketplaces.json: { path: claude/plugins/known_marketplaces.json, force: true }
    ~/.claude/skills/my-voice: { path: claude/skills/my-voice, create: true, force: true }
    ~/.claude/skills/my-mrs: { path: claude/skills/my-mrs, create: true, force: true }

- shell:
  - command: "sudo /home/$(whoami)/dotfiles/env-setup.sh"
    stdout: true
    stderr: true
    description: "Running env setup script."
  - command: "claude/setup.sh"
    stdout: true
    stderr: true
    description: "Linking Claude memory dir."

